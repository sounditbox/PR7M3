{% extends "base.html" %}

{% block title %}{{ title }} | L13 Blog{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8 col-xl-7">
        <div class="glass-card rounded-5 p-4 p-lg-5">
            <div class="mb-4">
                <span class="badge rounded-pill text-bg-primary-subtle text-primary-emphasis px-3 py-2 mb-3">Editor</span>
                <h1 class="h2 fw-bold mb-2">{{ title }}</h1>
                <p class="text-secondary mb-0">Simple form, better spacing, proper visual hierarchy.</p>
            </div>

            <form method="post" novalidate>
                {% csrf_token %}
                {% include "includes/_form_fields.html" %}
                <div class="d-flex flex-wrap gap-2 pt-2">
                    <button type="submit" class="btn btn-primary btn-lg">{{ title }}</button>
                    <a href="{% url 'blog:post_list' %}" class="btn btn-light btn-lg border">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
