
{% if messages %}
    <div class="mb-4">
        {% for message in messages %}
            <div data-auto-dismiss="true" class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show shadow-sm fade-out" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    </div>
{% endif %}
